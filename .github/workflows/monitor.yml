name: Monitor Radar

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: recruitment-radar-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out the latest data
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: monitor/requirements.txt

      - name: Install monitor dependencies
        run: python -m pip install -r monitor/requirements.txt

      - name: Verify monitor rules
        run: PYTHONPATH=. python -m pytest monitor/tests -q

      - name: Check public recruitment sources
        run: python -m monitor.run

      - name: Save changed radar data
        run: |
          git config user.name "geology-job-radar[bot]"
          git config user.email "geology-job-radar[bot]@users.noreply.github.com"
          git add data/radar.json monitor/state.json
          if git diff --cached --quiet; then
            echo "No radar data changed"
          else
            git commit -m "chore(data): refresh recruitment radar"
            git push origin HEAD:main
          fi
